  <body onclick="hideContextMenu(event); hideContextMenu(event,true);" onorientationchange="respondToResize();" onkeydown="handleKeyDown(event);" onload="documentLoaded();">
    <script src="group11.js" defer></script>
    <script src="group12.js" defer></script>
	  <script src="group17.js" defer></script>
	  <script src="group18.js" defer></script>
	  <script src="group19.js" defer></script>
	  <script src="group20.js" defer></script>
	  <script src="group21.js" defer></script>
	  <script src="group22.js" defer></script>
	  <script src="group23.js" defer></script>
	  <script src="group24.js" defer></script>
	  <script src="group25.js" defer></script>
	  <script src="group26.js" defer></script>
	  <script src="group27.js" defer></script>
    <script src="group28.js" defer></script>
    <script src="group29.js" defer></script>
    <script src="group30.js" defer></script>
    <script src="group31.js" defer></script>
    <script src="group32.js" defer></script>
    <script src="group33.js" defer></script>
    <script src="group34.js" defer></script>

    <script src="group37.js" defer></script>
    <script src="group38.js" defer></script>
    <script src="bidding.js" defer></script>

   
    <div class="mainDivStyle" id="theDiv" oncontextmenu="contextMenuRequest(event); return false;">
     
    </div>
    <div class="container" id="biddingBox">
      <div class="actions">
        <button class="action" id="pass">Pass</button>
        <button class="action" id="dbl">Dbl</button>
        <button class="action" id="redbl">ReDbl</button>
    </div>
    <div class="numbers">
        <button class="number" data-value="1">1</button>
        <button class="number" data-value="2">2</button>
        <button class="number" data-value="3">3</button>
        <button class="number" data-value="4">4</button>
        <button class="number" data-value="5">5</button>
        <button class="number" data-value="6">6</button>
        <button class="number" data-value="7">7</button>
    </div>
    <div class="suits" id="suits-row">
        <button class="suit" data-value="♣">♣</button>
        <button class="suit diamond" data-value="♦">♦</button>
        <button class="suit heart" data-value="♥">♥</button>
        <button class="suit" data-value="♠">♠</button>
        <button class="suit" data-value="NT">NT</button>
    </div>
  </div>
    
    <div class="editorDivStyle" id="editorDiv"></div>
    <div class="annotDivStyle" id="annotDiv"></div>
    <div class="buttonDivStyle" id="buttonDiv" oncontextmenu="return false;">
      <input type="button" value="New" onclick="newDeal()" id="newButton" class="buttonStyle" />
      <input
        type="button"
        value="Shuffle"
        onclick="shuffle()"
        id="shuffleButton"
        class="buttonStyle"
      />
      <input
        type="button"
        value="Rewind"
        onclick="rewind()"
        id="rewindButton"
        class="buttonStyle"
      />
      <input type="button" value="Previous" onclick="undo()" id="undoButton" class="buttonStyle" />
      <input type="button" value="Next" onclick="nextBid()" id="nextButton" class="buttonStyle" />
      <input
        type="button"
        value="Options"
        onclick="options()"
        id="optionsButton"
        class="buttonStyle"
      />
      <input type="button" value="GIB" onclick="gib()" id="gibButton" class="buttonStyle" />
      <input type="button" value="Play" onclick="play()" id="playButton" class="buttonStyle" />

      
      
    </div>
    
  </body>
